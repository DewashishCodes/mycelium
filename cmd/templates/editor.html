<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mycelium Network | Live Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-dark: #121217;
            --accent: #3b82f6;
            --accent-muted: rgba(59, 130, 246, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --glass: rgba(18, 18, 23, 0.7);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 80px;
            background: var(--panel-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 24px;
            margin-bottom: 50px;
            cursor: default;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border-radius: 12px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: var(--accent-muted);
        }

        .nav-item.active {
            color: var(--accent);
            background: var(--accent-muted);
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            left: -16px;
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
        }

        /* --- FORM PANEL --- */
        .form-panel {
            width: 500px;
            background: var(--panel-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-header {
            padding: 30px;
            border-bottom: 1px solid var(--border);
            background: var(--panel-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            margin: 0;
            font-weight: 600;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--accent-muted);
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* Form Elements */
        .form-group { margin-bottom: 24px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            background: #1e1e24;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }

        .card {
            background: #1a1a20;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: #2563eb; }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            border-color: var(--text-dim);
            color: var(--text-main);
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent-muted);
        }

        .btn-danger {
            background: transparent;
            color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; }

        .btn-full { width: 100%; margin-top: 10px; margin-bottom: 40px; }

        /* --- PREVIEW PANEL --- */
        .preview-panel {
            flex: 1;
            background: var(--bg-dark);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 60px 40px;
            scrollbar-width: thin;
        }

        .paper {
            background: white;
            color: #1a1a1a;
            width: 210mm;
            min-height: 297mm;
            padding: 60px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            font-family: 'Times New Roman', Times, serif;
            position: relative;
            transform-origin: top center;
            transition: transform 0.3s;
        }

        .preview-header {
            position: fixed;
            top: 20px;
            right: 40px;
            z-index: 50;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* --- TOAST --- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2dd4bf;
            color: #0d1117;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(45, 212, 191, 0.3);
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* --- RESUME STYLING --- */
        .res-name { text-align: center; font-size: 26pt; font-weight: 700; border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 10px; }
        .res-contact { text-align: center; font-size: 11pt; margin-bottom: 15px; }
        .res-sec { font-weight: bold; text-transform: uppercase; border-bottom: 1px solid black; margin-top: 20px; font-size: 13pt; margin-bottom: 8px; letter-spacing: 0.5px; }
        .res-row { display: flex; justify-content: space-between; font-weight: bold; margin-top: 6px; font-size: 11pt; }
        .res-sub { font-style: italic; font-size: 10.5pt; display: flex; justify-content: space-between; }
        ul { margin: 6px 0; padding-left: 20px; }
        li { font-size: 10.5pt; margin-bottom: 4px; text-align: justify; }

    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">M</div>
        <div class="nav-item active" onclick="setTab('basics', this)" title="Profile">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2m8-10a4 4 0 100-8 4 4 0 000 8z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="nav-item" onclick="setTab('education', this)" title="Education">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m-5-3.5v3.5l5 2.5 5-2.5v-3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="nav-item" onclick="setTab('experience', this)" title="Experience">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="nav-item" onclick="setTab('projects', this)" title="Projects">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="nav-item" onclick="setTab('skills', this)" title="Skills">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 011-1h1a2 2 0 100-4H7a1 1 0 01-1-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div style="flex: 1"></div>
        <div class="nav-item" onclick="setTab('order', this)" title="Order">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
    </div>

    <div class="form-panel">
        <div class="panel-header">
            <h1 id="tab-title">Basics</h1>
            <div class="status-badge">AUTO-SYNC ON</div>
        </div>
        <div class="content-area" id="form-area"></div>
    </div>

    <div class="preview-panel">
        <div class="preview-header">
            <div class="live-indicator"></div>
            <span>LIVE PREVIEW</span>
            <span style="opacity: 0.3">|</span>
            <span id="save-status">All changes saved</span>
        </div>
        <div id="capture-area" class="paper"></div>
    </div>

    <div id="toast">Changes Saved!</div>

    <script id="data-raw" type="text/plain">{{.}}</script>

    <script>
        let resume = JSON.parse(document.getElementById('data-raw').textContent);
        let currentTab = 'basics';
        let saveTimeout;

        // --- CORE FUNCTIONS ---
        function setTab(t, el) {
            currentTab = t;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('tab-title').innerText = t.charAt(0).toUpperCase() + t.slice(1);
            renderForm();
        }

        function renderForm() {
            const area = document.getElementById('form-area');
            area.innerHTML = '';

            if (currentTab === 'basics') {
                area.innerHTML = renderGroup('Full Name', 'name', resume.basics.name, 'basics') +
                                 renderGroup('Email Address', 'email', resume.basics.email, 'basics') +
                                 renderGroup('Phone Number', 'phone', resume.basics.phone, 'basics') +
                                 renderGroup('LinkedIn Profile', 'linkedin', resume.basics.linkedin, 'basics') +
                                 renderGroup('GitHub Profile', 'github', resume.basics.github, 'basics');
            } else if (currentTab === 'education') {
                resume.education.forEach((edu, i) => {
                    let card = createCard('education', i);
                    card.innerHTML += renderGroup('Institution', 'school', edu.school, 'education', i) +
                                     renderGroup('Degree / Major', 'degree', edu.degree, 'education', i) +
                                     renderGroup('Dates', 'date', edu.date, 'education', i) +
                                     renderGroup('GPA / Score', 'cgpa', edu.cgpa, 'education', i);
                    area.appendChild(card);
                });
                area.appendChild(createAddBtn('education', {school:'', degree:'', date:'', cgpa:''}));
            } else if (currentTab === 'experience') {
                resume.experience.forEach((exp, i) => {
                    let card = createCard('experience', i);
                    card.innerHTML += renderGroup('Company Name', 'company', exp.company, 'experience', i) +
                                     renderGroup('Job Role', 'role', exp.role, 'experience', i) +
                                     renderGroup('Date Range', 'date', exp.date, 'experience', i) +
                                     renderGroup('Bullet Points', 'points', (exp.points || []).join('\n'), 'experience', i, true);
                    area.appendChild(card);
                });
                area.appendChild(createAddBtn('experience', {company:'', role:'', date:'', points:[]}));
            } else if (currentTab === 'projects') {
                resume.projects.forEach((prj, i) => {
                    let card = createCard('projects', i);
                    card.innerHTML += renderGroup('Project Name', 'name', prj.name, 'projects', i) +
                                     renderGroup('Technologies Used', 'tech', prj.tech, 'projects', i) +
                                     renderGroup('Details', 'points', (prj.points || []).join('\n'), 'projects', i, true);
                    area.appendChild(card);
                });
                area.appendChild(createAddBtn('projects', {name:'', tech:'', points:[]}));
            } else if (currentTab === 'skills') {
                Object.keys(resume.skills).forEach(key => {
                    area.innerHTML += renderGroup(key, key, resume.skills[key], 'skills', null, true);
                });
            } else if (currentTab === 'order') {
                resume.sectionOrder.forEach((sec, i) => {
                    let card = document.createElement('div'); card.className = 'card';
                    card.style.display = 'flex'; card.style.justifyContent = 'space-between'; card.style.alignItems = 'center';
                    card.innerHTML = '<span style="font-weight:700; letter-spacing:1px">'+sec.toUpperCase()+'</span>' + 
                                     '<div class="card-actions" style="margin:0; border:0">' +
                                     '<button class="btn btn-ghost" onclick="moveItem(\'sectionOrder\','+i+',-1)">↑</button>' +
                                     '<button class="btn btn-ghost" onclick="moveItem(\'sectionOrder\','+i+',1)">↓</button></div>';
                    area.appendChild(card);
                });
            }
        }

        // --- UI COMPONENTS ---
        function renderGroup(lbl, field, val, section, index = null, isTextarea = false) {
            const inputId = `inp-${section}-${field}-${index ?? ''}`;
            const inputHtml = isTextarea 
                ? `<textarea id="${inputId}" rows="4" oninput="updateData('${section}', '${field}', this.value, ${index})">${val || ''}</textarea>`
                : `<input id="${inputId}" value="${val || ''}" oninput="updateData('${section}', '${field}', this.value, ${index})">`;
            
            return `<div class="form-group"><label>${lbl}</label>${inputHtml}</div>`;
        }

        function createCard(arr, i) {
            let d = document.createElement('div'); d.className = 'card';
            let act = document.createElement('div'); act.className = 'card-actions';
            act.innerHTML = `<button class="btn btn-ghost" onclick="moveItem('${arr}', ${i}, -1)">Move Up</button>` +
                            `<button class="btn btn-ghost" onclick="moveItem('${arr}', ${i}, 1)">Move Down</button>` +
                            `<button class="btn btn-danger" onclick="removeItem('${arr}', ${i})">Delete</button>`;
            d.appendChild(act);
            return d;
        }

        function createAddBtn(arr, template) {
            let b = document.createElement('button'); b.className = 'btn btn-outline btn-full'; b.innerText = '+ Add New Entry';
            b.onclick = () => { resume[arr].push(template); renderForm(); renderPreview(); debounceSave(); };
            return b;
        }

        // --- DATA HUB ---
        function updateData(section, field, value, index) {
            document.getElementById('save-status').innerText = 'Saving...';
            
            if (section === 'basics') resume.basics[field] = value;
            else if (section === 'skills') resume.skills[field] = value;
            else if (index !== null) {
                if (field === 'points') resume[section][index][field] = value.split('\n');
                else resume[section][index][field] = value;
            }
            
            renderPreview();
            debounceSave();
        }

        function moveItem(arr, i, dir) {
            let t = i+dir; if(t < 0 || t >= resume[arr].length) return;
            [resume[arr][i], resume[arr][t]] = [resume[arr][t], resume[arr][i]];
            renderForm(); renderPreview(); debounceSave();
        }

        function removeItem(arr, i) {
            if(confirm('Permanently remove this entry?')) {
                resume[arr].splice(i, 1);
                renderForm(); renderPreview(); debounceSave();
            }
        }

        function debounceSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(save, 1500);
        }

        async function save() {
            try {
                const res = await fetch('/save', { method: 'POST', body: JSON.stringify(resume) });
                if (res.ok) {
                    document.getElementById('save-status').innerText = 'All changes saved';
                    showToast();
                } else {
                    document.getElementById('save-status').innerText = 'Save Error';
                }
            } catch (e) {
                document.getElementById('save-status').innerText = 'Saving Blocked';
            }
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // --- PREVIEW ---
        function renderPreview() {
            const paper = document.getElementById('capture-area');
            if (!resume.basics) return;

            let h = `<div class="res-name">${resume.basics.name || "Full Name"}</div>`;
            h += `<div class="res-contact">` + 
                 [resume.basics.phone, resume.basics.email, resume.basics.linkedin, resume.basics.github].filter(Boolean).join(" • ") + 
                 `</div>`;

            (resume.sectionOrder || []).forEach(sec => {
                if (sec === 'education' && resume.education?.length) {
                    h += `<div class="res-sec">Education</div>`;
                    resume.education.forEach(e => {
                        h += `<div class="res-row"><span>${e.school||""}</span><span>${e.date||""}</span></div>`;
                        h += `<div class="res-sub"><span>${e.degree||""}</span><span>${e.cgpa ? 'GPA: '+e.cgpa : ''}</span></div>`;
                    });
                } else if (sec === 'skills' && resume.skills) {
                    h += `<div class="res-sec">Technical Skills</div>`;
                    for (let k in resume.skills) {
                        h += `<div style="font-size:10.5pt; margin-top:4px"><strong>${k}:</strong> ${resume.skills[k]}</div>`;
                    }
                } else if (sec === 'experience' && resume.experience?.length) {
                    h += `<div class="res-sec">Experience</div>`;
                    resume.experience.forEach(exp => {
                        h += `<div class="res-row"><span>${exp.company||""}</span><span>${exp.date||""}</span></div>`;
                        h += `<div class="res-sub"><span>${exp.role||""}</span></div>`;
                        h += `<ul>${(exp.points||[]).filter(p=>p.trim()).map(p => `<li>${p}</li>`).join('')}</ul>`;
                    });
                } else if (sec === 'projects' && resume.projects?.length) {
                    h += `<div class="res-sec">Projects</div>`;
                    resume.projects.forEach(p => {
                        h += `<div class="res-row"><span>${p.name||""} | <span style="font-weight:normal; font-style:italic">${p.tech||""}</span></span></div>`;
                        h += `<ul>${(p.points||[]).filter(p=>p.trim()).map(p => `<li>${p}</li>`).join('')}</ul>`;
                    });
                }
            });
            paper.innerHTML = h;
        }

        window.onload = () => { renderForm(); renderPreview(); };
    </script>
</body>
</html>
